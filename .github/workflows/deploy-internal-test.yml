name: Deploy to Google Play Internal Test

on:
  push:
    branches: [main]
    paths:
      - "TreacheryAndroid/**"
  workflow_dispatch:

concurrency:
  group: deploy-android-internal
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TreacheryAndroid
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: TreacheryAndroid/gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create dummy google-services.json for CI
        run: |
          cat > app/google-services.json << 'GSJSON'
          {"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.solomon.treachery"}},"api_key":[{"current_key":"dummy"}]}],"configuration_version":"1"}
          GSJSON

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

  deploy:
    name: Build & Upload to Internal Test Track
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: TreacheryAndroid
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: TreacheryAndroid/gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: TreacheryAndroid

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.keystore

      - name: Decode Google Play service account key
        env:
          GOOGLE_PLAY_JSON_KEY_BASE64: ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY_BASE64" | base64 --decode > $RUNNER_TEMP/google-play-key.json

      - name: Build and upload to internal test track
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_JSON_KEY_PATH: ${{ runner.temp }}/google-play-key.json
        run: bundle exec fastlane internal

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: TreacheryAndroid/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Clean up secrets
        if: always()
        run: |
          rm -f $RUNNER_TEMP/release.keystore
          rm -f $RUNNER_TEMP/google-play-key.json
