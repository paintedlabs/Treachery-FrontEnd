name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ── iOS ──────────────────────────────────────────────
  ios:
    name: iOS Build & Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: Treachery-iOS
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode and list simulators
        run: |
          # Use latest available Xcode that matches installed simulator runtimes
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcrun simctl list devices available | grep iPhone | head -5

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Treachery-iOS.xcodeproj -scheme Treachery-iOS

      - name: Build and run unit tests
        run: |
          xcodebuild test \
            -project Treachery-iOS.xcodeproj \
            -scheme Treachery-iOS \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:Treachery-iOSTests \
            -enableCodeCoverage YES \
            -resultBundlePath ../build/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/TestResults.xcresult
          retention-days: 14

      - name: Convert coverage to lcov
        if: success()
        run: |
          xcrun llvm-cov export \
            $(find ../build/TestResults.xcresult -name '*.profdata' -path '*/ProfileMerged.profdata' | head -1 | xargs -I {} dirname {})/../.. \
            -instr-profile $(find ../build/TestResults.xcresult -name 'ProfileMerged.profdata' | head -1) \
            -format lcov > ../build/coverage.lcov 2>/dev/null || true

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.lcov
          flags: ios
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  ios-lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  # ── Android ─────────────────────────────────────────
  android:
    name: Android Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TreacheryAndroid
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: TreacheryAndroid/gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: TreacheryAndroid/app/build/reports/tests/
          retention-days: 14

      - name: Upload test XML for annotations
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-xml
          path: TreacheryAndroid/app/build/test-results/
          retention-days: 14

  # ── Web ──────────────────────────────────────────────
  web-app:
    name: Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Treachery
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Treachery/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build:web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          EXPO_PUBLIC_ENVIRONMENT: ci

  # ── Cloud Functions ──────────────────────────────────
  functions:
    name: Cloud Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run lint
