# SwiftLint Configuration for Treachery-iOS

included:
  - Treachery-iOS/Treachery-iOS
  - Treachery-iOS/Treachery-iOSTests
  - Treachery-iOS/Treachery-iOSUITests

excluded:
  - Treachery-iOS/Treachery-iOS.xcodeproj
  - Treachery-iOS/Treachery-iOS/Treachery-iOS/GoogleService-Info.plist
  - .build
  - DerivedData

# Rules
disabled_rules:
  - trailing_comma
  - todo
  - implicit_optional_initialization
  - unused_closure_parameter
  - static_over_final_class
  - empty_string

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - first_where
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

# Configuration
line_length:
  warning: 160
  error: 250
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 800
  error: 1200

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 6
  error: 8

type_name:
  min_length: 3
  max_length: 50
  excluded:
    - Treachery_iOSApp
    - Treachery_iOSTests
    - Treachery_iOSUITests
    - Treachery_iOSUITestsLaunchTests

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - p
    - a
    - r
    - g
    - b
    - c
    - d

large_tuple:
  warning: 4

nesting:
  type_level: 2
  function_level: 3

reporter: xcode
